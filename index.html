    <!-- Inline fallback styles so the page is never fully blank -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #edf2f7;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      .dark body, .dark html { background: #0f172a; }

      /* Loading spinner shown until React mounts */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: inherit;
      }
      #app-loader .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #cbd5e1;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* Hide loader once React renders content */
      #root:not(:empty) ~ #app-loader { display: none; }
    </style>
